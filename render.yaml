services:
  - type: web
    name: maire-pood-backend
    runtime: node
    plan: free
    envVars:
      - key: ADMIN_PASSWORD
        value: maire2026
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://mairerasta.eu
      - key: DATABASE_URL
        fromDatabase:
          name: maire-pood-db
          property: connectionString

databases:
  - name: maire-pood-db
    databaseName: mairepood
    user: mairepood
