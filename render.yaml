services:
  - type: web
    name: maire-pood-backend
    runtime: docker
    plan: free
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: maire-pood-db
          property: connectionString

databases:
  - name: maire-pood-db
    databaseName: mairepood
    user: mairepood
